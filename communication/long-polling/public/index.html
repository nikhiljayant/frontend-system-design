<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Long Polling Demo</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f7f9fa;
    }
    #chat-box {
      border: 1px solid #ccc;
      background-color: #fff;
      height: 300px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
    }
    .message {
      padding: 6px 10px;
      margin-bottom: 8px;
      background-color: #e9ecef;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    form {
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <h1>Long Polling Chat</h1>
  
  <!-- Message display area -->
  <div id="chat-box"></div>

  <!-- Form to send a message -->
  <form id="message-form">
    <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <script>
    const chatBox = document.getElementById('chat-box');
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message-input');

    // Keep track of the total number of messages received
    let lastIndex = 0;

    // Core long-polling function
    async function pollMessages() {
      try {
        // Send a request to the server, passing our current message index
        const response = await fetch(`/api/messages?lastIndex=${lastIndex}`);
        
        if (!response.ok) {
          throw new Error(`HTTP Error: ${response.status}`);
        }

        const newMessages = await response.json();
        
        // If new messages were returned, append them and update the index
        if (newMessages.length > 0) {
          newMessages.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'message';
            div.textContent = msg;
            chatBox.appendChild(div);
            lastIndex++;
          });
          
          // Auto-scroll chat box to the bottom
          chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Immediately start the next long-polling request
        pollMessages();

      } catch (error) {
        console.error('Long polling error, retrying in 5s...', error);
        // Wait 5 seconds before retrying if there's a connection or server error
        setTimeout(pollMessages, 5000);
      }
    }

    // Event listener for sending a message
    messageForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;

      try {
        // Send the message to the backend via POST
        await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        messageInput.value = ''; // Clear the input field
      } catch (error) {
        console.error('Error posting message:', error);
      }
    });

    // Start the long-polling loop immediately on page load
    pollMessages();
  </script>
</body>
</html>
