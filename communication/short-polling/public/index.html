<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Short Polling Demo</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f7f9fa;
    }
    #chat-box {
      border: 1px solid #ccc;
      background-color: #fff;
      height: 300px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
    }
    .message {
      padding: 6px 10px;
      margin-bottom: 8px;
      background-color: #e9ecef;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    form {
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Short Polling Chat</h1>
  
  <!-- Message display area -->
  <div id="chat-box"></div>

  <!-- Form to send a message -->
  <form id="message-form">
    <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <script>
    const chatBox = document.getElementById('chat-box');
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message-input');

    // Function to retrieve latest messages from the server
    async function fetchMessages() {
      try {
        const response = await fetch('/api/messages');
        const messages = await response.json();
        
        // Re-render the message box content
        chatBox.innerHTML = '';
        messages.forEach(msg => {
          const div = document.createElement('div');
          div.className = 'message';
          div.textContent = msg;
          chatBox.appendChild(div);
        });
        
        // Auto-scroll chat box to the bottom
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (error) {
        console.error('Error fetching messages:', error);
      }
    }

    // Event listener for sending a message
    messageForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;

      try {
        // Send the message to the backend via POST
        await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        messageInput.value = ''; // Clear the input field
      } catch (error) {
        console.error('Error posting message:', error);
      }
    });

    // Start short polling: trigger fetchMessages every 3 seconds
    const intervalID = setInterval(fetchMessages, 3000);
    clearInterval(intervalID);
    
    // Run once on load to fetch initial messages immediately
    fetchMessages();
  </script>
</body>
</html>
