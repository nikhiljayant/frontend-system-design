<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Socket.io Chat Demo</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f7f9fa;
    }
    #chat-box {
      border: 1px solid #ccc;
      background-color: #fff;
      height: 300px;
      overflow-y: auto;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
    }
    .message {
      padding: 6px 10px;
      margin-bottom: 8px;
      background-color: #e9ecef;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    form {
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Socket.io Chat</h1>
  
  <!-- Message display area -->
  <div id="chat-box"></div>

  <!-- Form to send a message -->
  <form id="message-form">
    <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <!-- Load socket.io client library served by the backend server -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const chatBox = document.getElementById('chat-box');
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message-input');

    // Connect to Socket.io server
    const socket = io();

    // Render a single message block in the chat box
    function renderMessage(msg) {
      const div = document.createElement('div');
      div.className = 'message';
      div.textContent = msg;
      chatBox.appendChild(div);
      
      // Auto-scroll chat box to the bottom
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Handle receipt of the full message history on startup
    socket.on('history', (messages) => {
      chatBox.innerHTML = '';
      messages.forEach(msg => {
        renderMessage(msg);
      });
    });

    // Handle receipt of a newly broadcasted message
    socket.on('message', (msg) => {
      renderMessage(msg);
    });

    // Event listener for sending a message
    messageForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (!message) return;

      // Emit message event to the server
      socket.emit('message', `User: ${message}`);
      messageInput.value = ''; // Clear the input field
    });
  </script>
</body>
</html>
