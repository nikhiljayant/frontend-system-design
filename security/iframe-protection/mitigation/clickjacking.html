<!DOCTYPE html>
<html>
<head>
    <title>Clickjacking Mitigation</title>
</head>
<body style="font-family: sans-serif; margin: 30px;">
    <h1>Lab 1: Clickjacking Mitigation</h1>
    <p>The victim page blocks framing. Notice that even at 100% opacity, the frame remains completely blank.</p>
    
    <label>Iframe Opacity: </label>
    <input type="range" id="slider" min="0" max="1" step="0.1" value="0.5">
    
    <div style="position: relative; width: 400px; height: 180px; background: gold; text-align: center; padding-top: 30px; margin-top: 15px; border: 1px solid #333;">
        <button style="padding: 12px 24px; background: blue; color: white; border: none;">CLAIM FREE IPAD</button>
        <iframe id="iframe" src="clickjacking-victim.html" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; opacity: 0.5;"></iframe>
    </div>

    <script>
        document.getElementById('slider').addEventListener('input', (e) => {
            document.getElementById('iframe').style.opacity = e.target.value;
        });
    </script>
    <p><a href="index.html">&larr; Back</a></p>
</body>
</html>
